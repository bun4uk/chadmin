name: Publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to push (defaults to "latest" + sha)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write
  id-token: write   # cosign keyless OIDC for VEX attestation

jobs:
  build-and-push:
    name: Build and push to Docker Hub & GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            bun4uk/chadmin
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            type=sha,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=chadmin
            org.opencontainers.image.description=ClickHouse admin panel — query monitor and access management.
            org.opencontainers.image.url=https://github.com/bun4uk/chadmin
            org.opencontainers.image.source=https://github.com/bun4uk/chadmin
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: aio
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Attach OpenVEX attestation
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          DIGEST="${{ steps.build.outputs.digest }}"
          for ref in "bun4uk/chadmin" "ghcr.io/${{ github.repository }}"; do
            echo "Attesting ${ref}@${DIGEST}"
            cosign attest \
              --predicate vex/chadmin.openvex.json \
              --type "https://openvex.dev/ns/v0.2.0" \
              "${ref}@${DIGEST}"
          done
