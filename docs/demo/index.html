    <style>
      html,
      body {
        margin: 0;
        background: var(--bg-0);
        color: var(--fg-1);
        font-family: var(--font-sans);
      }
      .light {
        background: #fff;
        color: #000;
      }
      pre,
      code {
        font-family: var(--font-mono);
      }
      .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        50% {
          opacity: 0.7;
        }
      }

      /* Accent button — consistent across themes */
      .btn-accent {
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 14px;
        line-height: 1.4;
        color: var(--accent-on-surface);
        border: 1px solid var(--accent-on-surface);
        background: transparent;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        font-family: var(--font-sans);
      }
      .btn-accent:hover:not(:disabled) {
        background: var(--accent-on-surface);
        color: var(--bg-0);
      }
      .btn-accent:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-accent-sm {
        font-size: 12px;
      }

      /* Native <select> — force appearance:none so our border renders */
      select.ch-select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        padding: 4px 28px 4px 10px;
        border-radius: 4px;
        border: 1px solid var(--accent-on-surface);
        background-color: transparent;
        color: var(--fg-1);
        font-size: 14px;
        line-height: 1.4;
        font-family: var(--font-sans);
        cursor: pointer;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
        background-repeat: no-repeat;
        background-position: right 8px center;
        background-size: 14px;
      }
      select.ch-select option {
        color: #1f1f1c;
        background: #fff;
      }

      /* Yellow-filled brand select (warehouse / service pickers) — dark theme only */
      select.ch-select-brand {
        background-color: #faff69;
        color: #1f1f1c;
        border-color: #1f1f1c;
      }
      html.light select.ch-select-brand {
        background-color: #ffffff;
        color: #1f1f1c;
        border-color: #1f1f1c;
      }

      /* Mobile overflow guard — grid children default to min-width:auto which lets
       long tables force the parent wider than its cell. Reset it everywhere. */
      main,
      main *,
      section,
      section * {
        min-width: 0;
      }
      .overflow-x-auto {
        max-width: 100%;
      }
      /* Tile containers must stay within their grid cell */
      main > section {
        overflow: hidden;
      }

      /* Danger button */
      .btn-danger {
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 14px;
        line-height: 1.4;
        color: #ff6b6b;
        border: 1px solid #ff6b6b;
        background: transparent;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        font-family: var(--font-sans);
      }
      .btn-danger:hover {
        background: #ff6b6b;
        color: #fff;
      }

      /* SQL code block — dark in dark theme, light in light theme */
      pre.sql-pre {
        background: #1f1f1c !important;
        border: 1px solid #3a3a36;
        color: #e8e8e3;
        padding: 12px;
        border-radius: 4px;
        overflow: auto;
        margin: 0;
      }
      pre.sql-pre code,
      pre.sql-pre code.hljs {
        background: transparent !important;
        color: inherit;
        padding: 0;
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.6;
      }

      /* Light-theme SQL recoloring — override atom-one-dark token colors with
       a light-on-light palette so every token has strong contrast on white. */
      html.light pre.sql-pre {
        background: #fafaf7 !important;
        border-color: #d0d0c8;
        color: #1f1f1c;
      }
      html.light pre.sql-pre .hljs-keyword,
      html.light pre.sql-pre .hljs-selector-tag,
      html.light pre.sql-pre .hljs-meta-keyword,
      html.light pre.sql-pre .hljs-doctag,
      html.light pre.sql-pre .hljs-section {
        color: #8a2be2;
        font-weight: 600;
      } /* purple — TABLE, SELECT, FROM */
      html.light pre.sql-pre .hljs-built_in,
      html.light pre.sql-pre .hljs-type,
      html.light pre.sql-pre .hljs-title,
      html.light pre.sql-pre .hljs-title.function_,
      html.light pre.sql-pre .hljs-title.class_,
      html.light pre.sql-pre .hljs-attr {
        color: #004d99;
      } /* blue — functions, types, ON */
      html.light pre.sql-pre .hljs-string,
      html.light pre.sql-pre .hljs-regexp,
      html.light pre.sql-pre .hljs-addition {
        color: #1d6b2f;
      } /* green — strings */
      html.light pre.sql-pre .hljs-number,
      html.light pre.sql-pre .hljs-literal {
        color: #a05a00;
      } /* amber — numbers, literals */
      html.light pre.sql-pre .hljs-comment,
      html.light pre.sql-pre .hljs-quote {
        color: #6b6b66;
        font-style: italic;
      }
      html.light pre.sql-pre .hljs-variable,
      html.light pre.sql-pre .hljs-template-variable,
      html.light pre.sql-pre .hljs-attribute {
        color: #a10000;
      } /* red — variables, placeholders */
      html.light pre.sql-pre .hljs-operator,
      html.light pre.sql-pre .hljs-punctuation {
        color: #1f1f1c;
      }
    </style>

FROM events
WHERE event_date >= toDate(now() - interval 7 day)
  AND user_id IN (1001, 1002, 1003)
GROUP BY event_type
ORDER BY c DESC
LIMIT 100`,
        b: `INSERT INTO analytics.hourly_rollup
SELECT toStartOfHour(event_time) AS h, country, count() AS hits
FROM events_raw WHERE event_date = today()
GROUP BY h, country`,
        c: `SELECT max(event_time) AS maxDataTime, now() - INTERVAL 600 SECOND AS maxSettlePoint
FROM text_log_2
WHERE event_date >= toDate(now() - interval 21600 second)
  AND event_time >= now() - interval 21600 second
  AND event_time < maxSettlePoint`,

        memMiB,

        query_id: id,
        user,
        elapsed,
        query: sql,
        memory_usage: memMiB * 1024 * 1024,
        formatted_memory_usage:

            ? (memMiB / 1024).toFixed(2) + " GiB"
            : memMiB + " MiB",
        peak_memory: peakMiB * 1024 * 1024,
        formatted_peak_memory: peakMiB + " MiB",
        formatted_peak_memory_usage:
          peakMiB >= 1024
            ? (peakMiB / 1024).toFixed(2) + " GiB"
            : peakMiB + " MiB",
        read_bytes: 0,
        formatted_read_bytes: memMiB * 4 + " MiB",

      function App() {
        const [theme, setTheme] = React.useState(
          () => localStorage.getItem("theme") || "dark",
        );
        React.useEffect(() => {
          document.documentElement.classList.toggle("light", theme === "light");
          localStorage.setItem("theme", theme);
        }, [theme]);

        const [topoMode, setTopoMode] = React.useState(
          () => localStorage.getItem("topoMode") || "cloud",
        );
        React.useEffect(() => {
          localStorage.setItem("topoMode", topoMode);
        }, [topoMode]);

        const [page, setPage] = React.useState(
          () => localStorage.getItem("page") || "query",
        );
        React.useEffect(() => {
          localStorage.setItem("page", page);
        }, [page]);

        const topology = TOPOLOGIES[topoMode];

        const [selectedTargetId, setSelectedTargetId] = React.useState(
          topology.targets[0].id,
        );
        React.useEffect(() => {
          setSelectedTargetId(topology.targets[0].id);
        }, [topoMode]);

        const [intervalSec, setIntervalSec] = React.useState(30);
        const [autoRefresh, setAutoRefresh] = React.useState(true);
        const [timeLeft, setTimeLeft] = React.useState(30);
        const [isRefreshing, setRefreshing] = React.useState(false);
        const [refreshKey, setRefreshKey] = React.useState(0);
        const isVisible = true;

        React.useEffect(
          () => setTimeLeft(intervalSec),
          [intervalSec, refreshKey],
        );
        React.useEffect(() => {
          if (!autoRefresh) return;
          const id = setInterval(
            () => setTimeLeft((t) => (t > 0 ? t - 1 : t)),
            1000,
          );
          return () => clearInterval(id);
        }, [autoRefresh]);
        React.useEffect(() => {
          if (!autoRefresh) return;
          const id = setInterval(() => doRefresh(), intervalSec * 1000);
          return () => clearInterval(id);
        }, [autoRefresh, intervalSec]);

        const doRefresh = () => {
          setRefreshing(true);
          setTimeout(() => {
            setRefreshing(false);
            setRefreshKey((k) => k + 1);
          }, 500);
        };

        const visibleTargets =
          topology.mode === "cloud"
            ? topology.targets.filter((t) => t.id === selectedTargetId)
            : topology.targets;

        const [killingIds, setKillingIds] = React.useState(new Set());
        const [wakingIds, setWakingIds] = React.useState(new Set());
        const [wakeConfirmTarget, setWakeConfirmTarget] = React.useState(null);
        const [queryModal, setQueryModal] = React.useState(null);
        const [memPopover, setMemPopover] = React.useState(null);
        const [userPopover, setUserPopover] = React.useState(null);

        const onKill = (qid, tid) => {
          setKillingIds((s) => new Set(s).add(qid));
          setTimeout(() => {
            toastRef.current?.(
              "Query " + qid.slice(0, 8) + " stopped",
              "success",
            );
            setKillingIds((s) => {
              const n = new Set(s);
              n.delete(qid);
              return n;
            });
          }, 900);
        };

        const onWake = (tid) => {
          const t = topology.targets.find((x) => x.id === tid);
          setWakeConfirmTarget(t);
        };

        const performWake = () => {
          const t = wakeConfirmTarget;
          setWakeConfirmTarget(null);
          setWakingIds((s) => new Set(s).add(t.id));
          toastRef.current?.("Wake signal sent", "success");
        };

        const toastRef = React.useRef(null);
        const ToastInjector = () => {
          const { addToast } = window.useToast();
          React.useEffect(() => {
            toastRef.current = addToast;
          }, [addToast]);
          return null;
        };

        const [deleteUser, setDeleteUser] = React.useState(null);

        return (
          <window.ToastProvider>
            <ToastInjector />
            <window.Shell
              topology={topology}
              selectedTargetId={selectedTargetId}
              onSelectTarget={setSelectedTargetId}
              intervalSec={intervalSec}
              onIntervalChange={setIntervalSec}
              autoRefresh={autoRefresh}
              onAutoChange={setAutoRefresh}
              timeLeft={timeLeft}
              isVisible={isVisible}
              isRefreshing={isRefreshing}
              onRefresh={doRefresh}
              theme={theme}
              onThemeToggle={() =>
                setTheme((t) => (t === "dark" ? "light" : "dark"))
              }
              currentPage={page}
              onNavigate={setPage}
            />

            {page === "query" && (
              <main
                className={
                  (isRefreshing ? "animate-pulse " : "") +
                  "grid gap-4 p-2 sm:p-4 grid-cols-1"
                }
              >
                {visibleTargets.map((t) => (
                  <window.TargetTile
                    key={t.id + refreshKey}
                    target={t}
                    data={
                      t.queryable
                        ? buildData(t.id)
                        : { sleeping: true, processes: {} }
                    }
                    killingIds={killingIds}
                    wakingIds={wakingIds}
                    onKill={onKill}
                    onWake={onWake}
                    onOpenQuery={(p) =>
                      setQueryModal({ id: p.query_id, sql: p.query })
                    }
                    onOpenMemory={(p, anchor) =>
                      setMemPopover({ proc: p, anchor })
                    }
                    onOpenUser={(p, anchor) =>
                      setUserPopover({ proc: p, anchor })
                    }
                    theme={theme}
                  />
                ))}
              </main>
            )}

            {page === "users" && (
              <main className="p-2 sm:p-4 flex flex-col gap-4">
                <window.UsersTable
                  data={USERS_FIXTURE}
                  onDelete={(u) => setDeleteUser(u)}
                />
              </main>
            )}

            {wakeConfirmTarget && (
              <window.ConfirmDialog
                title="Wake service?"
                message={`Send wake signal to "${wakeConfirmTarget.name}" (currently ${wakeConfirmTarget.state})?\n\nClickHouse Cloud may take a few minutes to bring the service online.`}
                confirmLabel="Wake"
                onConfirm={performWake}
                onCancel={() => setWakeConfirmTarget(null)}
              />
            )}
            {queryModal && (
              <window.QueryModal
                queryId={queryModal.id}
                sql={queryModal.sql}
                onClose={() => setQueryModal(null)}
                onKill={onKill}
              />
            )}
            {memPopover && (
              <window.MemoryPopover
                proc={memPopover.proc}
                anchor={memPopover.anchor}
                onClose={() => setMemPopover(null)}
              />
            )}
            {userPopover && (
              <window.UserPopover
                proc={userPopover.proc}
                anchor={userPopover.anchor}
                onClose={() => setUserPopover(null)}
              />
            )}
            {deleteUser && (
              <window.ConfirmDialog
                title="Delete user?"
                message={`Delete user "${deleteUser}" on target "${topology.targets[0].name}"?`}
                confirmLabel="Delete"
                danger
                onConfirm={() => {
                  toastRef.current?.(
                    "User " + deleteUser + " deleted",
                    "success",
                  );
                  setDeleteUser(null);
                }}
                onCancel={() => setDeleteUser(null)}
              />
            )}
          </window.ToastProvider>
        );
      }

      // Wait for all deferred scripts to load
      function mount() {
        if (
          !window.Shell ||
          !window.TargetTile ||
          !window.ToastProvider ||
          !window.QueryModal
        ) {
          setTimeout(mount, 50);
          return;
        }
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      }
      mount();
    </script>
  </body>
</html>
