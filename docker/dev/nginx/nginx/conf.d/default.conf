server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Дозволяємо Nginx щоразу оновлювати DNS-запис сервісу `app`
    resolver 127.0.0.11 ipv6=off;
    # Змінна, щоб примусити повторну резолюцію при кожному запиті
    set $php_backend "app:9000";

    # For serving embedded Symfony Encore resources
    location /build/ {
        try_files $uri =404;
    }

    # For serving existing Vite assets (to prevent breakage)
    location /assets/ {
        try_files $uri =404;
    }

    location / {
        # First try to serve static file, then pass to PHP
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass      $php_backend;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;
    }

    # Return 404 for all other PHP files
    location ~ \.php$ {
        return 404;
    }
}
