services:
  nginx:
    build:
      context: .
      dockerfile: docker/dev/nginx/Dockerfile
    volumes:
      - ./docker/dev/nginx/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html
    ports:
      - "80:80"
    depends_on:
      - app
      - frontend
    env_file:
      - .env
    networks:
      - sp-net

  app:
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    networks:
      - sp-net

  composer:
    image: composer:latest
    volumes:
      - .:/app
    working_dir: /app
    command: ["composer"]
    networks:
      - sp-net

  frontend:
    image: node:24.15.0-alpine3.23
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "npm install && npm run watch"
    networks:
      - sp-net
    deploy:
      resources:
        limits:
          memory: 8G

networks:
  sp-net:
    driver: "bridge"
